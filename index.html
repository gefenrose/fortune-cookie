<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fortune Cookie</title>
  <meta name="description" content="Your daily fortune, freshly cracked." />
  <meta name="theme-color" content="#faf7f2" id="themeColorMeta" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Fortune" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="https://gefenrose.github.io/fortune-cookie/icons/icon-180.png" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400;1,600&family=Inter:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      padding: 24px;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ── Themes ── */
    body.theme-parchment {
      background: #faf7f2;
      color: #1a1a1a;
      --text: #1a1a1a;
      --sub: #aaa;
      --divider: #d0c8b8;
      --btn-bg: #fff;
      --btn-border: #e0d8cc;
      --btn-hover: #f5f0e8;
      --btn-color: #555;
      --export-bg: #faf7f2;
      --export-card: #f5f0e8;
      --export-card-border: rgba(180,160,130,0.35);
      --export-title: #b07858;
      --export-text: #2a1a0a;
      --export-sub: #b8a888;
      --export-date: #c0aa88;
    }
    body.theme-midnight {
      background: #0d0d14;
      color: #e8e0f0;
      --text: #e8e0f0;
      --sub: #666;
      --divider: #2a2a3a;
      --btn-bg: #1a1a28;
      --btn-border: #2a2a3a;
      --btn-hover: #22223a;
      --btn-color: #aaa;
      --export-bg: #0d0d14;
      --export-card: #13131f;
      --export-card-border: rgba(100,80,160,0.3);
      --export-title: #9080c0;
      --export-text: #e8e0f0;
      --export-sub: #555570;
      --export-date: #44445a;
    }
    body.theme-matcha {
      background: #f2f5ee;
      color: #1f2a1a;
      --text: #1f2a1a;
      --sub: #9aaa88;
      --divider: #c8d8b8;
      --btn-bg: #fff;
      --btn-border: #d0dcc0;
      --btn-hover: #eaf0e0;
      --btn-color: #4a6040;
      --export-bg: #f2f5ee;
      --export-card: #eaf0e2;
      --export-card-border: rgba(120,160,80,0.25);
      --export-title: #6a9050;
      --export-text: #1f2a1a;
      --export-sub: #8aaa70;
      --export-date: #a0be88;
    }
    body.theme-rose {
      background: #fdf4f4;
      color: #2a1a1a;
      --text: #2a1a1a;
      --sub: #c8a0a0;
      --divider: #e8c8c8;
      --btn-bg: #fff;
      --btn-border: #f0d8d8;
      --btn-hover: #faeaea;
      --btn-color: #885050;
      --export-bg: #fdf4f4;
      --export-card: #f8ecec;
      --export-card-border: rgba(200,120,120,0.25);
      --export-title: #c06060;
      --export-text: #2a1a1a;
      --export-sub: #c8a0a0;
      --export-date: #d8b0b0;
    }

    .container {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .date {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--sub);
      text-transform: uppercase;
      margin-bottom: 48px;
      transition: color 0.4s;
    }

    .cookie-btn {
      font-size: 72px;
      line-height: 1;
      cursor: pointer;
      background: none;
      border: none;
      padding: 16px;
      border-radius: 50%;
      transition: transform 0.15s ease, opacity 0.15s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .cookie-btn:hover { transform: scale(1.08); }
    .cookie-btn:active { transform: scale(0.94); opacity: 0.8; }
    .cookie-btn.gone {
      transform: scale(0.6);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.3s ease, opacity 0.25s ease;
    }

    .hint {
      font-size: 12px;
      color: var(--sub);
      margin-top: 16px;
      letter-spacing: 0.05em;
      transition: opacity 0.3s, color 0.4s;
    }
    .hint.gone { opacity: 0; }

    .fortune-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
      position: absolute;
    }
    .fortune-wrap.visible {
      opacity: 1;
      transform: none;
      pointer-events: all;
      position: relative;
    }

    .fortune-text {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-size: clamp(18px, 5vw, 22px);
      line-height: 1.7;
      color: var(--text);
      text-align: center;
      font-weight: 400;
      transition: color 0.4s;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--divider);
      transition: background 0.4s;
    }

    .lucky {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--sub);
      text-transform: uppercase;
      text-align: center;
      transition: color 0.4s;
    }

    .actions {
      display: flex;
      gap: 12px;
      width: 100%;
      margin-top: 8px;
    }

    .btn {
      flex: 1;
      padding: 13px;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--btn-color);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn:hover { background: var(--btn-hover); color: var(--text); }
    .btn:active { opacity: 0.8; }

    /* ── Theme picker ── */
    .theme-picker {
      position: fixed;
      bottom: 28px;
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 50;
    }
    .theme-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .theme-dot:hover { transform: scale(1.2); }
    .theme-dot.active { border-color: var(--text); transform: scale(1.15); }
    .theme-dot[data-theme="parchment"] { background: #d4b880; }
    .theme-dot[data-theme="midnight"]  { background: #6050a0; }
    .theme-dot[data-theme="matcha"]    { background: #7aaa50; }
    .theme-dot[data-theme="rose"]      { background: #d07070; }

    canvas { display: none; }

    #installBanner {
      display: none;
      position: fixed;
      bottom: 64px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: var(--btn-bg);
      font-size: 12px;
      letter-spacing: 0.06em;
      padding: 12px 20px;
      border-radius: 100px;
      cursor: pointer;
      white-space: nowrap;
      z-index: 100;
    }
  </style>
</head>
<body class="theme-parchment">

  <div class="container">
    <div class="date" id="dateLabel"></div>

    <div id="precrack" style="display:flex;flex-direction:column;align-items:center;">
      <button class="cookie-btn" id="cookieBtn" onclick="crack()" aria-label="Crack your fortune cookie">🥠</button>
      <div class="hint" id="hint">tap to open</div>
    </div>

    <div class="fortune-wrap" id="fortuneWrap">
      <div class="fortune-text" id="fortuneText"></div>
      <div class="divider"></div>
      <div class="lucky" id="luckyNumbers"></div>
      <div class="actions">
        <button class="btn" onclick="reset()">↺ New day</button>
        <button class="btn" onclick="exportFortune()">↓ Save image</button>
      </div>
    </div>
  </div>

  <div class="theme-picker">
    <div class="theme-dot active" data-theme="parchment" onclick="setTheme('parchment')" title="Parchment"></div>
    <div class="theme-dot"        data-theme="midnight"  onclick="setTheme('midnight')"  title="Midnight"></div>
    <div class="theme-dot"        data-theme="matcha"    onclick="setTheme('matcha')"    title="Matcha"></div>
    <div class="theme-dot"        data-theme="rose"      onclick="setTheme('rose')"      title="Rose"></div>
  </div>

  <canvas id="exportCanvas"></canvas>
  <div id="installBanner">Add to Home Screen</div>

  <script>
    const FORTUNES = [
      "The journey of a thousand miles begins with a single, courageous step. Have you tried driving?",
      "A wise person knows the limits of their own wisdom. You are not yet wise.",
      "Something beautiful is about to happen — keep your eyes open.",
      "The obstacle in your path is not a wall. It is a door. It was unlocked the whole time.",
      "You will soon discover a hidden talent. Hopefully before your next job interview.",
      "The best time to plant a tree was yesterday. The second best time is now. You will probably do neither.",
      "What you seek is also seeking you. Check your spam folder.",
      "Patience is not passive. It is concentrated strength. Also, the WiFi is just slow.",
      "An unexpected reunion brings joy beyond measure.",
      "Your silence is often more powerful than a thousand words. Try it in meetings.",
      "New opportunities emerge where old doors have closed. Also, some doors are just stuck — try pushing.",
      "A small act of kindness creates ripples that reach distant shores.",
      "The universe is always conspiring in your favor. Currently on a coffee break.",
      "Your greatest strength lies in knowing when to be gentle. Your second greatest is parallel parking.",
      "Today's dream is tomorrow's destination. Tonight's dream will just be confusing.",
      "Trust the timing of your own unfolding. The timing is not great, but trust it.",
      "Where curiosity leads, wisdom follows. Usually at a safe distance.",
      "Fortune favors those who are prepared to be surprised. You were not prepared.",
      "The moon does not worry whether it is seen. It simply shines. Be more like the moon, less like you.",
      "Every ending carries the seed of a remarkable beginning. Every fortune cookie carries this sentence.",
      "Still waters run deep — trust what lies beneath the surface.",
      "An important message is on its way to you. It will arrive when you are in the shower.",
      "The bamboo bends but does not break. So too shall you. Probably.",
      "Look for the magic in the mundane — it is always there.",
      "Your next chapter is the most interesting one yet. The previous ones needed work.",
      "The stars aligned for you today. Statistically, this was overdue.",
      "One who lights another's lantern also brightens their own path. One who eats another's fries makes an enemy.",
      "Joy shared is joy doubled. Sorrow shared is sorrow halved. Snacks shared are snacks gone.",
      "Mountains exist to be crossed, not feared. Hills, however, are optional.",
      "A long-held wish is about to be fulfilled. Please have a backup wish ready.",
      "Your attention is your most precious resource. You have spent some of it reading this.",
      "To forgive is to set a prisoner free and discover the prisoner was you.",
      "Change is the only constant — let it carry you forward. Also laundry.",
      "Rest is not idleness. It is the preparation for greatness. This nap is load-bearing.",
      "A small crack lets in the light. A large crack lets in a draft — call a contractor.",
      "You are exactly where you are supposed to be. No, really. Stop moving.",
      "The answer you've been searching for was inside you all along. So was that weird pain. See a doctor.",
      "What seems impossible today will be a fond memory tomorrow.",
      "Harmony is not the absence of conflict, but the wisdom to navigate it. Good luck at dinner.",
      "Help — I am trapped inside a fortune cookie factory.",
      "Today is a good day to make a decision you'll confidently second-guess by evening.",
      "The person who says it cannot be done should not interrupt the person doing it. But maybe listen to them.",
      "You will be hungry again in one hour.",
      "A wise man once said nothing. Everyone assumed he was brilliant.",
      "Do not worry about money. Worry about everything else. Then also worry about money.",
      "Someone is thinking about you right now. It is the person you owe money to.",
      "Good things come to those who wait. So does a cold meal.",
      "The cookie was the real fortune all along.",
      "This fortune intentionally left blank. (It wasn't.)",
      "You have been chosen. We cannot say for what. Good luck.",
    ];

    const LUCKY_SETS = [
      [3,17,22,8,44],[7,14,21,36,49],[2,11,29,38,42],
      [5,18,27,33,47],[1,9,16,34,48],[6,13,25,31,45],[4,12,23,37,50],
    ];

    const THEME_EXPORT = {
      parchment: { bg:'#faf7f2', card:'#f5f0e8', cardBorder:'rgba(180,160,130,0.35)', title:'#b07858', text:'#2a1a0a', sub:'#b8a888', date:'#c0aa88' },
      midnight:  { bg:'#0d0d14', card:'#13131f', cardBorder:'rgba(100,80,160,0.3)',   title:'#9080c0', text:'#e8e0f0', sub:'#555570', date:'#44445a' },
      matcha:    { bg:'#f2f5ee', card:'#eaf0e2', cardBorder:'rgba(120,160,80,0.25)',  title:'#6a9050', text:'#1f2a1a', sub:'#8aaa70', date:'#a0be88' },
      rose:      { bg:'#fdf4f4', card:'#f8ecec', cardBorder:'rgba(200,120,120,0.25)', title:'#c06060', text:'#2a1a1a', sub:'#c8a0a0', date:'#d8b0b0' },
    };

    // ── Theme ──
    let currentTheme = localStorage.getItem('fortune_theme') || 'parchment';
    applyTheme(currentTheme, false);

    function applyTheme(name, save = true) {
      currentTheme = name;
      document.body.className = `theme-${name}`;
      document.querySelectorAll('.theme-dot').forEach(d => {
        d.classList.toggle('active', d.dataset.theme === name);
      });
      if (save) localStorage.setItem('fortune_theme', name);
    }
    function setTheme(name) { applyTheme(name); }

    // ── Fortune logic ──
    function getBrowserSeed() {
      const ua = navigator.userAgent;
      let hash = 0;
      for (let i = 0; i < ua.length; i++) hash = (hash * 31 + ua.charCodeAt(i)) >>> 0;
      return hash;
    }
    function getDayIndex() {
      return Math.floor((Date.now() - new Date(2024,0,1)) / 86400000);
    }
    function getTodayFortune() {
      const day = getDayIndex(), browser = getBrowserSeed();
      return {
        text:  FORTUNES[(day * 7919 + browser) % FORTUNES.length],
        lucky: LUCKY_SETS[(day * 6271 + browser) % LUCKY_SETS.length],
      };
    }
    function formatDate() {
      return new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    }

    document.getElementById('dateLabel').textContent = formatDate();

    const todayKey = new Date().toISOString().slice(0,10);
    if (localStorage.getItem('fortune_cracked') === todayKey) {
      showFortune();
      document.getElementById('precrack').style.display = 'none';
    }

    function crack() {
      document.getElementById('cookieBtn').classList.add('gone');
      document.getElementById('hint').classList.add('gone');
      localStorage.setItem('fortune_cracked', todayKey);
      setTimeout(() => {
        document.getElementById('precrack').style.display = 'none';
        showFortune();
      }, 320);
    }

    function showFortune() {
      const { text, lucky } = getTodayFortune();
      document.getElementById('fortuneText').textContent = text;
      document.getElementById('luckyNumbers').textContent = 'Lucky · ' + lucky.join('  ');
      requestAnimationFrame(() => requestAnimationFrame(() => {
        document.getElementById('fortuneWrap').classList.add('visible');
      }));
    }

    function reset() {
      localStorage.removeItem('fortune_cracked');
      location.reload();
    }

    // ── Export ──
    async function exportFortune() {
      const { text, lucky } = getTodayFortune();
      const t = THEME_EXPORT[currentTheme];
      const size = 1080;
      const canvas = document.getElementById('exportCanvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const pad = size * 0.055, r = size * 0.055;

      ctx.fillStyle = t.bg;
      ctx.fillRect(0, 0, size, size);

      roundRect(ctx, pad, pad, size - pad*2, size - pad*2, r);
      ctx.fillStyle = t.card; ctx.fill();
      roundRect(ctx, pad, pad, size - pad*2, size - pad*2, r);
      ctx.strokeStyle = t.cardBorder; ctx.lineWidth = 2; ctx.stroke();

      const titleY = pad + size * 0.085;
      ctx.font = `italic ${size*0.044}px Lora, Georgia, serif`;
      ctx.fillStyle = t.title; ctx.textAlign = 'center';
      ctx.fillText('Fortune Cookie', size/2, titleY);

      await drawEmoji(ctx, '🥠', size/2, size * 0.48, size * 0.32, 0.18);

      ctx.fillStyle = t.text;
      ctx.font = `italic ${size*0.046}px Lora, Georgia, serif`;
      const lines = wrapText(ctx, text, size * 0.72);
      const lh = size * 0.068, totalH = lines.length * lh;
      const ty = size * 0.5 - totalH / 2 + lh * 0.75;
      lines.forEach((l, i) => ctx.fillText(l, size/2, ty + i * lh));

      ctx.font = `${size*0.032}px Georgia, serif`;
      ctx.fillStyle = t.sub;
      ctx.fillText('lucky  ·  ' + lucky.join('   '), size/2, size * 0.74);

      ctx.font = `${size*0.036}px Georgia, serif`;
      ctx.fillStyle = t.date;
      ctx.fillText(new Date().toLocaleDateString('en-GB').replace(/\//g, '.'), size/2, size - pad - size*0.04);

      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `fortune-${todayKey}.png`;
        a.click(); URL.revokeObjectURL(url);
      }, 'image/png');
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
      ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
      ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
      ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
      ctx.closePath();
    }
    function wrapText(ctx, text, maxW) {
      const words = text.split(' '), lines = []; let line = '';
      for (const w of words) {
        const t = line ? `${line} ${w}` : w;
        if (ctx.measureText(t).width > maxW && line) { lines.push(line); line = w; }
        else line = t;
      }
      if (line) lines.push(line);
      return lines;
    }
    function drawEmoji(ctx, emoji, cx, cy, size, opacity = 1) {
      return new Promise(resolve => {
        const off = document.createElement('canvas');
        off.width = size * 2; off.height = size * 2;
        const octx = off.getContext('2d');
        octx.font = `${size * 1.6}px serif`;
        octx.textAlign = 'center'; octx.textBaseline = 'middle';
        octx.fillText(emoji, size, size);
        requestAnimationFrame(() => {
          ctx.save(); ctx.globalAlpha = opacity;
          ctx.drawImage(off, cx - size, cy - size, size * 2, size * 2);
          ctx.restore(); resolve();
        });
      });
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); deferredPrompt = e;
      const b = document.getElementById('installBanner');
      b.style.display = 'block';
      b.onclick = async () => {
        b.style.display = 'none'; deferredPrompt.prompt();
        await deferredPrompt.userChoice; deferredPrompt = null;
      };
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        // When a new SW takes over, reload to get fresh content
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'activated' && navigator.serviceWorker.controller) {
              location.reload();
            }
          });
        });
      }).catch(() => {});

      // Also reload if the controller changes (new SW took over on next visit)
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) { refreshing = true; location.reload(); }
      });
    }
  </script>
</body>
</html>
